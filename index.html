<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Full Body 3-Day</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0c;--s1:#141418;--s2:#1c1c22;--s3:#24242c;--bd:#2a2a34;--t:#e8e6e3;--td:#8a8894;--tm:#5a5868;--c0:#f05545;--c1:#4e9af0;--c2:#45c97a;--c3:#d4a853;--d0:rgba(240,85,69,.12);--d1:rgba(78,154,240,.12);--d2:rgba(69,201,122,.12);--d3:rgba(212,168,83,.12);--r:12px;--rs:8px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
textarea{font-family:'DM Sans',sans-serif}

.hdr{position:sticky;top:0;z-index:100;background:rgba(10,10,12,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:16px 20px 0}
.hdr h1{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;letter-spacing:-.5px;margin-bottom:14px}
.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;min-width:0;padding:10px 10px;font-size:10px;font-weight:600;color:var(--tm);cursor:pointer;border-bottom:2px solid transparent;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;text-transform:uppercase;transition:all .2s;white-space:nowrap}
.tab.a0{color:var(--c0);border-bottom-color:var(--c0)}
.tab.a1{color:var(--c1);border-bottom-color:var(--c1)}
.tab.a2{color:var(--c2);border-bottom-color:var(--c2)}
.tab.a3{color:var(--c3);border-bottom-color:var(--c3)}
.tab.a4,.tab.a5,.tab.a6,.tab.a7,.tab.a8{color:var(--t);border-bottom-color:var(--t)}

.cnt{padding:16px;padding-bottom:100px}
.lbl{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--tm);margin-bottom:12px}
.tag{display:inline-block;margin-left:8px;padding:2px 8px;border-radius:4px;font-size:10px;letter-spacing:1px}

.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.card-hd{display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer;user-select:none}
.num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.info{flex:1;min-width:0}
.name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.musc{font-size:11px;color:var(--tm);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.last{font-size:10px;color:var(--td);font-family:'JetBrains Mono',monospace;margin-top:3px}
.pr-badge{font-size:9px;color:#fbbf24;font-family:'JetBrains Mono',monospace;margin-top:2px;letter-spacing:.5px}
.sets{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--td);flex-shrink:0;white-space:nowrap}
.chev{flex-shrink:0;width:18px;height:18px;fill:var(--tm);transition:transform .25s}
.card.open .chev{transform:rotate(180deg)}
.drop{max-height:0;overflow:hidden;transition:max-height .3s ease}
.card.open .drop{max-height:2000px}
.drop-in{padding:0 16px 14px;border-top:1px solid var(--bd);padding-top:12px}
.dlbl{font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--tm);margin-bottom:8px}

.alt{display:flex;align-items:center;padding:8px 12px;border-radius:var(--rs);cursor:pointer;gap:10px}
.alt.sel{background:var(--s3)}
.alt-r{width:18px;height:18px;border-radius:50%;border:2px solid var(--tm);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.alt.sel .alt-r{border-color:var(--accent)}
.alt-d{width:8px;height:8px;border-radius:50%;background:transparent}
.alt.sel .alt-d{background:var(--accent)}
.alt-n{font-size:14px;font-weight:500;flex:1}

.btn{padding:10px 0;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;cursor:pointer;flex:1;text-align:center}
.btn-p{color:var(--bg)}
.btn-s{background:var(--s2);color:var(--td);border:1px solid var(--bd)}
.btn-a{color:var(--accent)}
.sinp{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--t);padding:9px 10px;font-size:14px;font-family:'JetBrains Mono',monospace;outline:none;min-width:0;text-align:center}

.ncard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:10px}
.ncard h3{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--td);margin-bottom:10px}
.ncard p{font-size:13px;line-height:1.6;color:var(--td)}

.mtog{display:flex;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.mtog-b{flex:1;padding:12px 8px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--tm)}
.mtog-b+.mtog-b{border-left:1px solid var(--bd)}

.bdesc{font-size:13px;line-height:1.6;color:var(--td);margin-bottom:16px;padding:12px 14px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r)}
.bdesc strong{font-weight:600}
.divider{margin:24px 0 12px;padding-top:16px;border-top:1px solid var(--bd)}

.hist-entry{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.hist-date{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--td);margin-bottom:6px}
.hist-sets{display:flex;flex-wrap:wrap;gap:6px}
.hist-chip{background:var(--s2);border-radius:6px;padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:13px}
.hist-note{font-size:12px;color:var(--tm);margin-top:6px;font-style:italic}

canvas.chart{width:100%;border-radius:8px;margin-top:8px}

/* Timer overlay */
.timer-overlay{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--s1);border-top:1px solid var(--bd);padding:16px 20px;display:none;align-items:center;gap:16px}
.timer-overlay.active{display:flex}
.timer-display{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;flex:1;text-align:center}
.timer-label{font-size:11px;color:var(--tm);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;text-align:center}
.timer-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--bd);background:var(--s2);color:var(--t);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0}

/* Calendar heatmap */
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px}
.hm-cell{aspect-ratio:1;border-radius:4px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--tm)}
.hm-cell.today{border:1px solid var(--td)}
.hm-hdr{font-size:9px;color:var(--tm);font-family:'JetBrains Mono',monospace;text-transform:uppercase;text-align:center;padding:4px 0}

/* Volume summary */
.vol-bar{height:8px;border-radius:4px;background:var(--s3);overflow:hidden;margin-top:4px}
.vol-fill{height:100%;border-radius:4px;transition:width .3s}
</style>
</head>
<body>
<div class="hdr">
  <h1>Full Body 3-Day</h1>
  <div class="tabs" id="tabs"></div>
</div>
<div class="cnt" id="app"></div>
<div class="timer-overlay" id="timerBar">
  <button class="timer-btn" onclick="cancelTimer()">&#x2715;</button>
  <div style="flex:1;text-align:center">
    <div class="timer-label" id="timerLbl">Rest</div>
    <div class="timer-display" id="timerDisp">0:00</div>
  </div>
  <button class="timer-btn" id="timerAction" onclick="toggleTimer()">&#9654;</button>
</div>

<script>
// ─── EXERCISE DATA ───
const P=[
  {label:"Monday",focus:"Squat Focus",exercises:[
    {name:"Barbell Back Squat",muscles:"Quads / Glutes",s:4,r:8,mg:"Legs",alts:["Barbell Back Squat","Barbell Front Squat","Goblet Squat","Trap Bar Squat"]},
    {name:"Dumbbell Bench Press",muscles:"Chest / Triceps",s:4,r:8,mg:"Chest",alts:["Dumbbell Bench Press","Barbell Bench Press","Cable Chest Press","Floor Press"]},
    {name:"Cable Row",muscles:"Back / Biceps",s:3,r:10,mg:"Back",alts:["Cable Row","Barbell Bent-Over Row","Dumbbell Single-Arm Row","T-Bar Row"]},
    {name:"Dumbbell Arnold Press",muscles:"Shoulders",s:3,r:10,mg:"Shoulders",alts:["Dumbbell Arnold Press","Dumbbell Lateral Raise","Cable Lateral Raise","Dumbbell Front Raise"]},
    {name:"Sliding Leg Curls",muscles:"Hamstrings",s:3,r:12,mg:"Legs",alts:["Sliding Leg Curls","Nordic Curls","Dumbbell Stiff-Leg Deadlift","Cable Pull-Through"]}]},
  {label:"Wednesday",focus:"Hinge Focus",exercises:[
    {name:"Trap Bar Deadlift",muscles:"Posterior Chain",s:4,r:6,mg:"Back",alts:["Trap Bar Deadlift","Conventional Deadlift","Sumo Deadlift","Barbell Romanian Deadlift"]},
    {name:"Dumbbell Incline Press",muscles:"Upper Chest / Shoulders",s:3,r:10,mg:"Chest",alts:["Dumbbell Incline Press","Barbell Incline Press","Low Cable Fly","Incline Dumbbell Fly"]},
    {name:"Pull-ups or Lat Pulldown",muscles:"Lats / Biceps",s:3,r:10,mg:"Back",alts:["Pull-ups or Lat Pulldown","Chin-ups","Cable Lat Pulldown (Close Grip)","Dumbbell Pullover"]},
    {name:"Face Pulls",muscles:"Rear Delts / Upper Back",s:3,r:15,mg:"Shoulders",alts:["Face Pulls","Band Pull-Aparts","Cable Reverse Fly","Dumbbell Reverse Fly"]},
    {name:"Dumbbell Lunges",muscles:"Quads / Glutes",s:3,r:10,mg:"Legs",alts:["Dumbbell Lunges","Dumbbell Reverse Lunges","Dumbbell Step-ups","Goblet Squat"]}]},
  {label:"Friday",focus:"Upper Emphasis",exercises:[
    {name:"Dumbbell Shoulder Press",muscles:"Shoulders / Triceps",s:3,r:10,mg:"Shoulders",alts:["Dumbbell Shoulder Press","Barbell Overhead Press","Arnold Press","Cable Shoulder Press"]},
    {name:"Cable Row or Seated Row",muscles:"Back / Biceps",s:3,r:10,mg:"Back",alts:["Cable Row or Seated Row","Dumbbell Single-Arm Row","Barbell Pendlay Row","Cable Straight-Arm Pulldown"]},
    {name:"Dips",muscles:"Chest / Triceps",s:3,r:10,mg:"Chest",alts:["Dips","Close-Grip Bench Press","Cable Tricep Pushdown","Dumbbell Skull Crushers"]},
    {name:"Bulgarian Split Squats",muscles:"Quads / Glutes",s:3,r:8,mg:"Legs",alts:["Bulgarian Split Squats","Barbell Front Squat","Dumbbell Lunges","Goblet Squat"]},
    {name:"Cable Pull-Throughs",muscles:"Glutes / Hamstrings",s:3,r:12,mg:"Legs",alts:["Cable Pull-Throughs","Dumbbell Romanian Deadlift","Sliding Leg Curls","Dumbbell Glute Bridge"]}]}
];
const BR=[
  {name:"Treadmill Walk (Incline)",muscles:"Conditioning",s:1,r:0,mg:"Cardio",alts:["Treadmill Walk (Incline)","Treadmill Jog (Easy Pace)","Treadmill Intervals"],sl:"20-30 min"},
  {name:"Cable Face Pulls (Light)",muscles:"Rear Delts / Posture",s:3,r:15,mg:"Shoulders",alts:["Cable Face Pulls (Light)","Band Pull-Aparts","Cable External Rotation"]},
  {name:"Dead Bugs",muscles:"Core Stability",s:3,r:10,mg:"Core",alts:["Dead Bugs","Bird Dogs","Pallof Press (Cable)","Side Planks"]},
  {name:"Goblet Squat (Light)",muscles:"Mobility / Quads",s:2,r:10,mg:"Legs",alts:["Goblet Squat (Light)","Bodyweight Squat to Box","Dumbbell Sumo Squat (Light)"]},
  {name:"Cable Pull-Through (Light)",muscles:"Glutes / Hamstrings",s:2,r:12,mg:"Legs",alts:["Cable Pull-Through (Light)","Dumbbell Glute Bridge","Dumbbell RDL (Light)"]}
];
const BA=[
  {name:"Dumbbell Bicep Curls",muscles:"Biceps",s:3,r:12,mg:"Arms",alts:["Dumbbell Bicep Curls","Cable Curls","Hammer Curls","Barbell Curls"]},
  {name:"Cable Tricep Pushdowns",muscles:"Triceps",s:3,r:12,mg:"Arms",alts:["Cable Tricep Pushdowns","Overhead Cable Extension","Dumbbell Skull Crushers","Close-Grip Push-ups"]},
  {name:"Cable Lateral Raises",muscles:"Side Delts",s:3,r:15,mg:"Shoulders",alts:["Cable Lateral Raises","Dumbbell Lateral Raises","Dumbbell Front Raise","Cable Front Raise"]},
  {name:"Hanging Leg Raises",muscles:"Core",s:3,r:12,mg:"Core",alts:["Hanging Leg Raises","Cable Crunches","Ab Wheel Rollout","Lying Leg Raises"]},
  {name:"Incline Dumbbell Curls",muscles:"Biceps (Long Head)",s:2,r:12,mg:"Arms",alts:["Incline Dumbbell Curls","Concentration Curls","Cable Preacher Curl","Reverse Curls"]},
  {name:"Overhead Cable Extension",muscles:"Triceps (Long Head)",s:2,r:12,mg:"Arms",alts:["Overhead Cable Extension","Dumbbell Kickbacks","Dumbbell Overhead Extension","Diamond Push-ups"]}
];
const ACC=[
  {name:"Bicep Curls",muscles:"Biceps",s:2,r:12,mg:"Arms",alts:["Dumbbell Bicep Curls","Cable Curls","Hammer Curls","Barbell Curls"]},
  {name:"Tricep Pushdowns",muscles:"Triceps",s:2,r:12,mg:"Arms",alts:["Cable Tricep Pushdowns","Overhead Cable Extension","Dumbbell Skull Crushers","Dumbbell Kickbacks"]},
  {name:"Hanging Leg Raises",muscles:"Core",s:3,r:12,mg:"Core",alts:["Hanging Leg Raises","Cable Crunches","Ab Wheel Rollout","Lying Leg Raises"]},
  {name:"Planks",muscles:"Core",s:3,r:0,mg:"Core",alts:["Planks","Side Planks","Dead Bugs","Pallof Press (Cable)"],sl:"3 x 45s"}
];
const AC=["#f05545","#4e9af0","#45c97a","#d4a853"];
const AD=["rgba(240,85,69,.12)","rgba(78,154,240,.12)","rgba(69,201,122,.12)","rgba(212,168,83,.12)"];
const CC=["#f05545","#4e9af0","#45c97a","#d4a853","#c084fc","#f472b6","#38bdf8","#fb923c","#a3e635","#e879f9","#67e8f9","#fbbf24"];
const MC={Legs:"#f05545",Chest:"#4e9af0",Back:"#45c97a",Shoulders:"#d4a853",Arms:"#c084fc",Core:"#f472b6",Cardio:"#38bdf8"};
const NOTES=[
  {t:"Rest Periods",b:"2-3 min between compound lifts, 60-90s between accessories."},
  {t:"Progression",b:"When you hit the top of the rep range on all sets, add 5 lbs (upper) or 10 lbs (lower) next session."},
  {t:"Warm-up",b:"5 min treadmill, then 2-3 ramp-up sets before your first working set of each exercise."},
  {t:"Recovery",b:"If going into a session still sore, drop one set per accessory. Persistent soreness after 2-3 more weeks means reduce volume further."}
];

// ─── STATE & STORAGE ───
let D={selections:{},history:{},sessions:[]};
// sessions: [{date,dayType,note}]
let day=0,bmode='recovery',histView=null,chartMode='ex',calMonth=new Date();
const SK='workout-app-v3';
function load(){try{const r=localStorage.getItem(SK);if(r){const p=JSON.parse(r);D.selections=p.selections||{};D.history=p.history||{};D.sessions=p.sessions||[]}}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(D))}catch(e){}}
function ek(n){return n.toLowerCase().replace(/[^a-z0-9]+/g,'_')}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
load();

// ─── PR TRACKING ───
function getPR(exKey){
  const h=D.history[exKey]||[];
  let maxW=0,maxVol=0;
  h.forEach(e=>e.sets.forEach(s=>{if(s.weight>maxW)maxW=s.weight;const v=s.weight*s.reps;if(v>maxVol)maxVol=v}));
  return{weight:maxW,volume:maxVol};
}
function isNewPR(exKey,sets){
  const pr=getPR(exKey);
  let newW=false,newV=false;
  sets.forEach(s=>{if(s.weight>pr.weight)newW=true;if(s.weight*s.reps>pr.volume)newV=true});
  return newW||newV;
}

// ─── REST TIMER ───
let timerInterval=null,timerRemaining=0,timerRunning=false,timerDuration=0;
function startRestTimer(seconds,label){
  timerDuration=seconds;timerRemaining=seconds;timerRunning=true;
  document.getElementById('timerLbl').textContent=label||'Rest';
  document.getElementById('timerBar').classList.add('active');
  document.getElementById('timerAction').innerHTML='&#10074;&#10074;';
  clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    timerRemaining--;
    updateTimerDisplay();
    if(timerRemaining<=0){clearInterval(timerInterval);timerRunning=false;
      document.getElementById('timerAction').innerHTML='&#10004;';
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
    }
  },1000);
}
function updateTimerDisplay(){
  const m=Math.floor(Math.abs(timerRemaining)/60);
  const s=Math.abs(timerRemaining)%60;
  document.getElementById('timerDisp').textContent=(timerRemaining<0?'-':'')+m+':'+String(s).padStart(2,'0');
  document.getElementById('timerDisp').style.color=timerRemaining<=0?'#f05545':'#e8e6e3';
}
function toggleTimer(){
  if(timerRemaining<=0){cancelTimer();return}
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerAction').innerHTML='&#9654;'}
  else{timerRunning=true;document.getElementById('timerAction').innerHTML='&#10074;&#10074;';
    timerInterval=setInterval(()=>{timerRemaining--;updateTimerDisplay();
      if(timerRemaining<=0){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerAction').innerHTML='&#10004;';if(navigator.vibrate)navigator.vibrate([200,100,200])}
    },1000)}
}
function cancelTimer(){clearInterval(timerInterval);timerRunning=false;timerRemaining=0;document.getElementById('timerBar').classList.remove('active')}

// ─── EXPORT / IMPORT ───
function exportData(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='workout-backup-'+todayStr()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);
      if(d.history){D.history=d.history;D.selections=d.selections||{};D.sessions=d.sessions||[];save();render();alert('Data restored successfully.')}
      else alert('Invalid backup file.')}catch(e){alert('Error reading file.')}};r.readAsText(f)};
  inp.click();
}

// ─── CHART DRAWING ───
function drawLineChart(canvas,datasets,labels,title){
  const dpr=window.devicePixelRatio||1;
  const w=canvas.parentElement.clientWidth-32;
  const h=220;
  canvas.width=w*dpr;canvas.height=h*dpr;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const pad={t:30,r:16,b:50,l:48};
  const cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  let mn=Infinity,mx=-Infinity;
  datasets.forEach(ds=>ds.data.forEach(v=>{if(v!==null&&v!==undefined){mn=Math.min(mn,v);mx=Math.max(mx,v)}}));
  if(mn===Infinity){mn=0;mx=100}
  if(mn===mx){mn-=10;mx+=10}
  const range=mx-mn;mn-=range*.05;mx+=range*.05;if(mn<0)mn=0;
  ctx.fillStyle='#5a5868';ctx.font="600 10px 'JetBrains Mono',monospace";ctx.textAlign='left';ctx.fillText(title.toUpperCase(),pad.l,16);
  const ySteps=4;ctx.strokeStyle='#1c1c22';ctx.lineWidth=1;ctx.fillStyle='#5a5868';ctx.font="10px 'JetBrains Mono',monospace";ctx.textAlign='right';
  for(let i=0;i<=ySteps;i++){const y=pad.t+ch-(i/ySteps)*ch;const val=mn+(i/ySteps)*(mx-mn);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();ctx.fillText(Math.round(val),pad.l-6,y+4)}
  ctx.textAlign='center';const step=Math.max(1,Math.floor(labels.length/6));
  labels.forEach((l,i)=>{if(i%step===0||i===labels.length-1){const x=pad.l+(i/(Math.max(labels.length-1,1)))*cw;ctx.fillText(l,x,h-pad.b+18)}});
  datasets.forEach(ds=>{ctx.strokeStyle=ds.color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.lineCap='round';ctx.beginPath();let started=false;
    ds.data.forEach((v,i)=>{if(v===null||v===undefined)return;const x=pad.l+(i/(Math.max(labels.length-1,1)))*cw;const y=pad.t+ch-((v-mn)/(mx-mn))*ch;if(!started){ctx.moveTo(x,y);started=true}else ctx.lineTo(x,y)});ctx.stroke();
    ctx.fillStyle=ds.color;ds.data.forEach((v,i)=>{if(v===null||v===undefined)return;const x=pad.l+(i/(Math.max(labels.length-1,1)))*cw;const y=pad.t+ch-((v-mn)/(mx-mn))*ch;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill()})});
  if(datasets.length>1){let lx=pad.l;const ly=h-8;ctx.font="9px 'JetBrains Mono',monospace";ctx.textAlign='left';
    datasets.forEach(ds=>{ctx.fillStyle=ds.color;ctx.fillRect(lx,ly-5,6,6);ctx.fillStyle='#8a8894';const tw=ctx.measureText(ds.name).width;
      if(lx+12+tw>w-pad.r){lx=pad.l;/* wrap not implemented, truncate */}ctx.fillText(ds.name,lx+10,ly+1);lx+=tw+20})}
}

function exCard(ex,di,ei,prefix){

  const sl=ex.sl||`${ex.s} x ${ex.r}`;const accent=AC[di]||AC[0];const accentDim=AD[di]||AD[0];const cid=`${prefix}_${ei}`;
  const pr=getPR(ekey);
  let lastStr='';if(last)lastStr=`<div class="last">Last: ${last.sets.map(s=>s.weight+'x'+s.reps).join(' / ')}</div>`;
  let prStr='';if(pr.weight>0)prStr=`<div class="pr-badge">\u2605 PR: ${pr.weight} lbs</div>`;
  let altsH=ex.alts.map((a,ai)=>`<div class="alt${ai===si?' sel':''}" style="--accent:${accent}" onclick="event.stopPropagation();selAlt('${prefix}',${ei},${ai})"><div class="alt-r"><div class="alt-d"></div></div><div class="alt-n">${a}</div></div>`).join('');

    ${hist.length?`<button class="btn btn-s" onclick="event.stopPropagation();viewHist('${cn.replace(/'/g,"\\'")}','${ekey}','${ex.mg}')">History (${hist.length})</button>`:''}
    <button class="btn btn-s" onclick="event.stopPropagation();startRestTimer(${restSec},'${cn.replace(/'/g,"\\'")}')" style="flex:0 0 auto;padding:10px 14px">\u23F1 ${restSec}s</button>
  </div></div>`;
  return `<div class="card" id="card_${cid}"><div class="card-hd" onclick="togCard('${cid}')">

function addSet(cid){
  const i=logSetCounts[cid];
  logSetCounts[cid]=i+1;
  // Pre-fill from S1 values if they exist
  const w0=document.getElementById('lw_'+cid+'_0');
  const r0=document.getElementById('lr_'+cid+'_0');
  const pw=w0?w0.value:'';const pr=r0?r0.value:'';
  const row=document.createElement('div');
  row.id='srow_'+cid+'_'+i;
  row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:6px';
  row.innerHTML=`<span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#5a5868;width:22px;text-align:center">S${i+1}</span>
    <input class="sinp" type="number" inputmode="decimal" placeholder="lbs" value="${pw}" id="lw_${cid}_${i}" onfocus="this.dataset.auto='0'">
    <span style="color:#5a5868;font-size:11px">x</span>
    <input class="sinp" type="number" inputmode="numeric" placeholder="reps" value="${pr}" id="lr_${cid}_${i}" onfocus="this.dataset.auto='0'">`;
  document.getElementById('setrows_'+cid).appendChild(row);
}

function autoFill(cid){
  const n=logSetCounts[cid]||1;
  const w=document.getElementById('lw_'+cid+'_0').value;
  const r=document.getElementById('lr_'+cid+'_0').value;
  for(let i=1;i<n;i++){
    const wEl=document.getElementById('lw_'+cid+'_'+i);
    const rEl=document.getElementById('lr_'+cid+'_'+i);
    if(wEl&&(!wEl.value||wEl.dataset.auto==='1')){wEl.value=w;wEl.dataset.auto='1'}
    if(rEl&&(!rEl.value||rEl.dataset.auto==='1')){rEl.value=r;rEl.dataset.auto='1'}
  }
}

function saveLog(cid,ekey,exName,mg,restSec){
  const numSets=logSetCounts[cid]||1;
  const sets=[];for(let i=0;i<numSets;i++){
    const w=parseFloat(document.getElementById('lw_'+cid+'_'+i).value)||0;
    const r=parseInt(document.getElementById('lr_'+cid+'_'+i).value)||0;sets.push({weight:w,reps:r})}
  const noteEl=document.getElementById('note_'+cid);const note=noteEl?noteEl.value.trim():'';
  const newPR=isNewPR(ekey,sets);
  if(!D.history[ekey])D.history[ekey]=[];
  D.history[ekey].push({date:new Date().toISOString(),exercise:exName,muscleGroup:mg,sets,note:note||undefined});
  // Record session for calendar
  const ts=todayStr();
  if(!D.sessions.find(s=>s.date===ts)){
    const dayType=day<=2?['Mon','Wed','Fri'][day]:(day===3?'Bonus':'Other');
    D.sessions.push({date:ts,dayType});}
  save();
  if(newPR)setTimeout(()=>alert('\u2B50 New Personal Record!'),100);
  startRestTimer(restSec,exName);
  render();
}

// ─── WEEKLY VOLUME ───
function getWeekVolume(){
  const now=new Date();const dayOfWeek=now.getDay();
  const weekStart=new Date(now);weekStart.setDate(now.getDate()-((dayOfWeek+6)%7));// Monday
  weekStart.setHours(0,0,0,0);
  const groups={};let totalSets=0;
  Object.keys(D.history).forEach(ekey=>{
    D.history[ekey].forEach(e=>{
      const d=new Date(e.date);
      if(d>=weekStart&&d<=now){
        const mg=e.muscleGroup||'Other';
        if(!groups[mg])groups[mg]={sets:0,volume:0};
        groups[mg].sets+=e.sets.length;
        groups[mg].volume+=e.sets.reduce((a,s)=>a+s.weight*s.reps,0);
        totalSets+=e.sets.length;
      }
    });
  });
  return{groups,totalSets};
}

// ─── CALENDAR HEATMAP ───
function getCalendarData(year,month){
  const first=new Date(year,month,1);const last=new Date(year,month+1,0);
  const startDay=(first.getDay()+6)%7;// Monday=0
  const days=[];
  for(let i=0;i<startDay;i++)days.push(null);
  for(let d=1;d<=last.getDate();d++){
    const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const session=D.sessions.find(s=>s.date===ds);
    days.push({day:d,date:ds,session});
  }
  return days;
}

  const pg=P[day];
  app.innerHTML=`<div class="lbl">${pg.label} <span class="tag" style="background:${AD[day]};color:${AC[day]}">${pg.focus}</span></div>
    ${pg.exercises.map((ex,ei)=>exCard(ex,day,ei,String(day))).join('')}
    <div class="divider"><div class="lbl">Optional Accessories <span style="font-weight:400">(any day)</span></div></div>
    ${ACC.map((ex,ei)=>exCard(ex,day,ei,'acc')).join('')}`;
}

function calcStreak(){
  if(!D.sessions.length)return 0;
  const now=new Date();const dayOfWeek=(now.getDay()+6)%7;
  let streak=0;let weekStart=new Date(now);weekStart.setDate(now.getDate()-dayOfWeek);weekStart.setHours(0,0,0,0);
  for(let w=0;w<52;w++){
    const ws=new Date(weekStart);ws.setDate(ws.getDate()-w*7);
    const we=new Date(ws);we.setDate(we.getDate()+6);
    const wsStr=ws.getFullYear()+'-'+String(ws.getMonth()+1).padStart(2,'0')+'-'+String(ws.getDate()).padStart(2,'0');
    const weStr=we.getFullYear()+'-'+String(we.getMonth()+1).padStart(2,'0')+'-'+String(we.getDate()).padStart(2,'0');
    const count=D.sessions.filter(s=>s.date>=wsStr&&s.date<=weStr).length;
    if(count>=3)streak++;else if(w>0)break;// don't break on current incomplete week
    else if(w===0&&count<3)continue;// current week may not be done
  }
  return streak;
}
