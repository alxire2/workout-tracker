<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0D0D0D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.svg">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:#0D0D0D;color:#F0EDE6;font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;max-width:480px;margin:0 auto;padding-top:env(safe-area-inset-top)}
.sg{font-family:'Space Grotesk',sans-serif}
@keyframes checkPop{0%{transform:scale(.8)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes progressPulse{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes confettiDrop{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes completeBanner{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes modalIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.header{padding:20px 20px 0;border-bottom:1px solid transparent}
.header-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
.day-label{font-size:11px;letter-spacing:3px;color:#666;text-transform:uppercase;margin-bottom:2px}
.date-big{font-size:28px;font-weight:700}
.workout-type{font-size:13px;font-weight:600;letter-spacing:1px}
.workout-sub{font-size:11px;color:#777;letter-spacing:1px}
.week-strip{display:flex;gap:4px;padding-bottom:16px;justify-content:space-between}
.week-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;background:transparent;border:1.5px solid transparent;border-radius:10px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none}
.week-day-name{font-size:10px;color:#555;letter-spacing:1px}
.week-day-num{font-size:15px;font-weight:400}
.week-day-dot{width:6px;height:6px;border-radius:50%;background:transparent}
.progress-section{padding:16px 20px 8px}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-label{font-size:11px;color:#666;letter-spacing:2px;text-transform:uppercase}
.progress-count{font-size:13px;font-weight:600}
.progress-track{height:6px;background:#1A1A1A;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.complete-banner{margin:8px 20px;padding:12px 16px;background:linear-gradient(135deg,#5A7D4F15,#7BAF6E15);border:1px solid #5A7D4F40;border-radius:12px;text-align:center;animation:completeBanner .4s ease-out;display:none}
.complete-banner.show{display:block}
.complete-text{font-size:14px;font-weight:600;color:#7BAF6E}
.exercises{padding:8px 20px 100px}
.exercise{margin-bottom:8px;background:#141414;border:1px solid #1E1E1E;border-radius:14px;overflow:hidden;animation:slideIn .3s ease-out both;transition:border-color .3s,background .3s}
.exercise.done{background:#5A7D4F0A;border-color:#5A7D4F30}
.exercise-header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:none;border:none;cursor:pointer;color:#F0EDE6;-webkit-appearance:none;appearance:none;outline:none;font-family:inherit}
.exercise-left{display:flex;align-items:center;gap:12px}
.exercise-icon{font-size:20px}
.exercise-name{font-size:14px;font-weight:600;text-align:left}
.exercise-detail{font-size:11px;color:#666;margin-top:2px;letter-spacing:.5px;text-align:left}
.exercise-right{display:flex;align-items:center;gap:10px}
.exercise-count{font-size:12px;color:#555;font-weight:500}
.exercise-arrow{font-size:12px;color:#444;transition:transform .2s;display:inline-block}
.exercise-arrow.open{transform:rotate(180deg)}
.sets-container{padding:0 16px 14px;display:none;flex-direction:column;gap:6px;animation:slideIn .2s ease-out}
.sets-container.open{display:flex}
.set-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#0D0D0D;border:1px solid #222;border-radius:10px;transition:all .2s}
.set-row.checked{border-color:var(--ac,#222)}
.set-check{width:26px;height:26px;border-radius:8px;border:2px solid #333;background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none}
.set-check.on{animation:checkPop .3s ease-out}
.set-num{font-size:12px;color:#666;width:18px;flex-shrink:0;text-align:center}
.set-inputs{display:flex;flex-direction:column;gap:4px;flex:1}
.set-input-row{display:flex;gap:6px;align-items:center}
.set-field{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.set-field label{font-size:9px;color:#555;letter-spacing:1px;text-transform:uppercase}
.set-field input{width:100%;background:#1A1A1A;border:1px solid #2A2A2A;border-radius:6px;color:#F0EDE6;font-family:inherit;font-size:14px;padding:6px 4px;text-align:center;outline:none;-webkit-appearance:none;appearance:none}
.set-field input:focus{border-color:var(--ac,#555)}
.set-field input::placeholder{color:#444;font-size:11px}
.ss-label{font-size:10px;color:#555;letter-spacing:.5px;width:100%;padding:2px 0 0}
.add-set-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;background:transparent;border:1px dashed #333;border-radius:10px;cursor:pointer;color:#666;font-size:12px;font-family:inherit;width:100%;-webkit-appearance:none;appearance:none;outline:none;transition:all .2s}
.add-set-btn:active{background:#1A1A1A;border-color:#555}
.remove-set-btn{width:20px;height:20px;border-radius:50%;background:transparent;border:1px solid #333;color:#555;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-appearance:none;appearance:none;outline:none;transition:all .2s;line-height:1}
.remove-set-btn:active{background:#3A1A1A;border-color:#E85D3A80;color:#E85D3A}
.swap-btn{background:none;border:1px solid #2A2A2A;border-radius:8px;color:#666;font-size:13px;padding:4px 8px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;transition:all .2s;flex-shrink:0;line-height:1}
.swap-btn:active{background:#1A1A1A;border-color:#555;color:#999}
.swap-btn.swapped{border-color:var(--ac,#555);color:var(--ac,#888)}
.ex-note{font-size:10px;color:#555;padding:0 0 6px;line-height:1.4;font-style:italic}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease-out}
.modal-sheet{background:#1A1A1A;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 20px 32px;animation:modalIn .25s ease-out;max-height:85vh;overflow-y:auto;padding-bottom:calc(32px + env(safe-area-inset-bottom))}
.modal-title{font-size:16px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:11px;color:#666;margin-bottom:16px;letter-spacing:.5px}
.modal-option{display:flex;align-items:center;gap:12px;padding:14px;background:#0D0D0D;border:1px solid #2A2A2A;border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .15s;-webkit-appearance:none;appearance:none;outline:none;width:100%;color:#F0EDE6;font-family:inherit;text-align:left}
.modal-option:active{background:#222;border-color:#444}
.modal-option.active{border-color:var(--ac,#555);background:color-mix(in srgb,var(--ac,#555) 10%,#0D0D0D)}
.modal-option-icon{font-size:20px;flex-shrink:0}
.modal-option-name{font-size:14px;font-weight:600}
.modal-option-detail{font-size:11px;color:#666;margin-top:2px}
.modal-reset{display:flex;align-items:center;justify-content:center;padding:14px;background:transparent;border:1px dashed #333;border-radius:12px;margin-bottom:8px;cursor:pointer;color:#888;font-size:13px;font-family:inherit;width:100%;-webkit-appearance:none;appearance:none;outline:none;transition:all .15s}
.modal-reset:active{background:#1A1A1A;border-color:#555}
.modal-cancel{display:flex;align-items:center;justify-content:center;padding:14px;background:#0D0D0D;border:1px solid #333;border-radius:12px;cursor:pointer;color:#F0EDE6;font-size:14px;font-weight:600;font-family:inherit;width:100%;-webkit-appearance:none;appearance:none;outline:none;transition:all .15s;margin-top:4px}
.modal-cancel:active{background:#222}
.confetti-container{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:100}
.pr-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#FFD700;letter-spacing:.5px;vertical-align:middle}
.pr-badge-icon{font-size:11px}
.pr-inline{display:flex;gap:12px;padding:6px 10px;margin-bottom:6px;background:#FFD70008;border:1px solid #FFD70025;border-radius:8px;flex-wrap:wrap}
.pr-inline-item{display:flex;flex-direction:column;gap:1px;flex:1;min-width:100px}
.pr-inline-label{font-size:9px;color:#FFD70088;letter-spacing:1px;text-transform:uppercase}
.pr-inline-val{font-size:13px;font-weight:600;color:#FFD700CC}
.report-btn{background:none;border:1px solid #2A2A2A;border-radius:8px;color:#888;font-size:12px;padding:6px 10px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;font-family:inherit;transition:all .2s;letter-spacing:.5px}
.report-btn:active{background:#1A1A1A;border-color:#555;color:#CCC}
.rpt-section{margin-bottom:20px}
.rpt-section-title{font-size:13px;font-weight:600;letter-spacing:1px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #222}
.rpt-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#0D0D0D;border:1px solid #222;border-radius:10px;margin-bottom:6px}
.rpt-name{font-size:13px;font-weight:500;flex:1}
.rpt-pr{display:flex;gap:16px;flex-shrink:0}
.rpt-pr-item{text-align:right}
.rpt-pr-label{font-size:9px;color:#555;letter-spacing:.5px;text-transform:uppercase}
.rpt-pr-val{font-size:13px;font-weight:600;color:#FFD700CC}
.rpt-empty{font-size:12px;color:#555;font-style:italic;padding:8px 0}
</style>
</head>
<body>
<div id="confetti-layer" class="confetti-container" style="display:none"></div>
<div id="modal-root"></div>

  <div class="header-row">
    <div>
      <div class="day-label" id="day-name"></div>

  </div>
  <div class="week-strip" id="week-strip"></div>
</div>
<div class="progress-section">

    <span class="progress-label">Progress</span>
    <span class="progress-count" id="progress-count"></span>

<div class="complete-banner" id="complete-banner"><span class="complete-text sg">Workout Complete ✓</span></div>
<div class="exercises" id="exercises"></div>

const DAY_NAMES=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let selectedDate=new Date();
let expandedExercise=null;
let dayData={};

function dateKey(d){return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate()}
function getDk(){return dateKey(selectedDate)}
function getDayType(d){return SCHEDULE[d.getDay()]}

function getDayEntry(dk){
  if(!dayData[dk])dayData[dk]={sets:{},extra:{},swaps:{}};
  const s=dayData[dk].sets;
  for(const k in s){if(s[k]===true)s[k]={done:true,weight:"",reps:""};}
  if(!dayData[dk].extra)dayData[dk].extra={};
  if(!dayData[dk].swaps)dayData[dk].swaps={};
  return dayData[dk];
}

function getEffectiveExercise(dk,exIdx,baseEx){
  const entry=getDayEntry(dk);
  const swapName=entry.swaps[exIdx];
  if(!swapName)return baseEx;
  const alts=ALTERNATIVES[baseEx.name];
  if(!alts)return baseEx;
  const found=alts.find(a=>a.name===swapName);
  if(!found)return baseEx;
  return {...baseEx,name:found.name,detail:found.detail,icon:found.icon,superset:!!found.superset,name2:found.name2||""};
}

function loadData(){
  try{const s=localStorage.getItem("workout-sets-v3");if(s)dayData=JSON.parse(s);}catch(e){}
  // Migrate v2 if exists
  if(!Object.keys(dayData).length){
    try{const s=localStorage.getItem("workout-sets-v2");if(s)dayData=JSON.parse(s);}catch(e){}
  }
}
function saveData(){localStorage.setItem("workout-sets-v3",JSON.stringify(dayData))}

function getSetData(dk,exIdx,si){const e=getDayEntry(dk);return e.sets[exIdx+"-"+si]||null}
function isSetDone(dk,exIdx,si){const sd=getSetData(dk,exIdx,si);return sd?sd.done:false}
function getExtraSets(dk,exIdx){return getDayEntry(dk).extra[exIdx]||0}

function toggleDone(exIdx,si){
  const dk=getDk(),e=getDayEntry(dk),k=exIdx+"-"+si;
  if(!e.sets[k])e.sets[k]={done:false,weight:"",reps:"",weight2:"",reps2:"",distance:""};
  e.sets[k].done=!e.sets[k].done;saveData();render();
}
function updateField(exIdx,si,field,val){
  const dk=getDk(),e=getDayEntry(dk),k=exIdx+"-"+si;
  if(!e.sets[k])e.sets[k]={done:false,weight:"",reps:"",weight2:"",reps2:"",distance:""};
  e.sets[k][field]=val;saveData();
}
function addExtraSet(exIdx){
  const dk=getDk(),e=getDayEntry(dk);
  e.extra[exIdx]=(e.extra[exIdx]||0)+1;saveData();render();
}
function removeExtraSet(exIdx,si){
  const dk=getDk(),e=getDayEntry(dk),k=exIdx+"-"+si;
  delete e.sets[k];
  const dayType=getDayType(selectedDate),w=WORKOUTS[dayType];
  const base=w.exercises[exIdx].sets,ext=e.extra[exIdx]||0,tot=base+ext;
  for(let i=si+1;i<tot;i++){const ok=exIdx+"-"+i,nk=exIdx+"-"+(i-1);if(e.sets[ok]){e.sets[nk]=e.sets[ok];delete e.sets[ok];}}
  e.extra[exIdx]=Math.max(0,ext-1);saveData();render();
}
function swapExercise(exIdx,altName){
  const dk=getDk(),e=getDayEntry(dk);
  if(altName===null)delete e.swaps[exIdx];else e.swaps[exIdx]=altName;
  saveData();render();
}
function countDone(dk,exIdx,tot){let n=0;for(let i=0;i<tot;i++)if(isSetDone(dk,exIdx,i))n++;return n}

function computePRs(){
  const prs={};
  for(const dk in dayData){
    const parts=dk.split("-");
    const d=new Date(parseInt(parts[0]),parseInt(parts[1]),parseInt(parts[2]));
    const dayType=getDayType(d);
    const workout=WORKOUTS[dayType];
    if(!workout)continue;
    const entry=dayData[dk];
    if(!entry||!entry.sets)continue;

    workout.exercises.forEach((baseEx,exIdx)=>{
      const ex=getEffectiveExercise(dk,exIdx,baseEx);
      const baseSets=baseEx.sets;
      const extraSets=(entry.extra&&entry.extra[exIdx])||0;
      const totalSets=baseSets+extraSets;

      for(let si=0;si<totalSets;si++){
        const sd=entry.sets[exIdx+"-"+si];
        if(!sd||!sd.done)continue;

        if(ex.cardio){
          const dist=parseFloat(sd.distance)||0;
          if(dist>0){
            const nm=ex.name;
            if(!prs[nm])prs[nm]={distance:0,cardio:true};
            if(dist>prs[nm].distance)prs[nm].distance=dist;
          }
        }else if(ex.superset){
          // Exercise 1
          const n1=ex.name.split(" / ")[0].trim();
          const w1=parseFloat(sd.weight)||0,r1=parseInt(sd.reps)||0;
          if(w1>0||r1>0){
            if(!prs[n1])prs[n1]={weight:0,weightReps:0,reps:0,repsWeight:0};
            if(w1>prs[n1].weight||(w1===prs[n1].weight&&r1>prs[n1].weightReps)){prs[n1].weight=w1;prs[n1].weightReps=r1;}
            if(r1>prs[n1].reps||(r1===prs[n1].reps&&w1>prs[n1].repsWeight)){prs[n1].reps=r1;prs[n1].repsWeight=w1;}
          }
          // Exercise 2
          const n2=ex.name2||ex.name.split(" / ")[1]||"";
          const w2=parseFloat(sd.weight2)||0,r2=parseInt(sd.reps2)||0;
          if(n2&&(w2>0||r2>0)){
            if(!prs[n2])prs[n2]={weight:0,weightReps:0,reps:0,repsWeight:0};
            if(w2>prs[n2].weight||(w2===prs[n2].weight&&r2>prs[n2].weightReps)){prs[n2].weight=w2;prs[n2].weightReps=r2;}
            if(r2>prs[n2].reps||(r2===prs[n2].reps&&w2>prs[n2].repsWeight)){prs[n2].reps=r2;prs[n2].repsWeight=w2;}
          }
        }else{
          const nm=ex.name;
          const w=parseFloat(sd.weight)||0,r=parseInt(sd.reps)||0;
          if(w>0||r>0){
            if(!prs[nm])prs[nm]={weight:0,weightReps:0,reps:0,repsWeight:0};
            if(w>prs[nm].weight||(w===prs[nm].weight&&r>prs[nm].weightReps)){prs[nm].weight=w;prs[nm].weightReps=r;}
            if(r>prs[nm].reps||(r===prs[nm].reps&&w>prs[nm].repsWeight)){prs[nm].reps=r;prs[nm].repsWeight=w;}
          }
        }
      }
    });
  }
  return prs;
}

function getPRText(prs,name){
  const p=prs[name];
  if(!p)return null;
  if(p.cardio)return p.distance>0?p.distance+" mi":null;
  if(p.weight<=0&&p.reps<=0)return null;
  return p.weight+"lbs x "+p.weightReps;
}

function showReportModal(){
  const prs=computePRs();
  const root=document.getElementById("modal-root");
  const ov=document.createElement("div");ov.className="modal-overlay";
  const sh=document.createElement("div");sh.className="modal-sheet";sh.style.maxHeight="90vh";

  const t=document.createElement("div");t.className="modal-title sg";t.textContent="🏆 Personal Records";t.style.color="#FFD700";
  sh.appendChild(t);
  const sub=document.createElement("div");sub.className="modal-sub";sub.textContent="All-time bests from completed sets";
  sh.appendChild(sub);

  const sections=[
    {label:"Push A — Strength",key:"PA",color:"#E85D3A"},
    {label:"Pull A — Strength",key:"PLA",color:"#E85D3A"},
    {label:"Legs A — Strength",key:"LA",color:"#E85D3A"},
    {label:"Push B — Volume",key:"PB",color:"#2D7DD2"},
    {label:"Pull B — Volume",key:"PLB",color:"#2D7DD2"},
    {label:"Legs B — Volume",key:"LB",color:"#2D7DD2"},
    {label:"Cardio",key:"_cardio",color:"#5A7D4F"}
  ];

  const seen=new Set();
  sections.forEach(sec=>{
    const sdiv=document.createElement("div");sdiv.className="rpt-section";
    const stitle=document.createElement("div");stitle.className="rpt-section-title sg";stitle.textContent=sec.label;stitle.style.color=sec.color;
    sdiv.appendChild(stitle);

    let exercises=[];
    if(sec.key==="_cardio"){
      exercises=Object.keys(prs).filter(n=>prs[n].cardio);
    }else{
      const w=WORKOUTS[sec.key];
      if(w)w.exercises.forEach(ex=>{
        if(ex.cardio)return;
        if(ex.superset){
          const n1=ex.name.split(" / ")[0].trim();
          const n2=ex.name2||ex.name.split(" / ")[1]||"";
          if(n1)exercises.push(n1);
          if(n2)exercises.push(n2);
        }else{
          exercises.push(ex.name);
        }
      });
    }

    // Also include swapped exercise PRs
    const allAltNames=new Set();
    if(sec.key!=="_cardio"){
      const w=WORKOUTS[sec.key];
      if(w)w.exercises.forEach(ex=>{
        const alts=ALTERNATIVES[ex.name];
        if(alts)alts.forEach(a=>{
          const an=a.superset?a.name.split(" / ")[0].trim():a.name;
          if(prs[an]&&!prs[an].cardio)allAltNames.add(an);
          if(a.superset&&a.name2&&prs[a.name2])allAltNames.add(a.name2);
        });
      });
    }

    let hasData=false;
    const renderRow=(nm)=>{
      if(seen.has(nm))return;seen.add(nm);
      const p=prs[nm];if(!p)return;
      hasData=true;
      const row=document.createElement("div");row.className="rpt-row";
      const name=document.createElement("div");name.className="rpt-name";name.textContent=nm;
      row.appendChild(name);
      const prDiv=document.createElement("div");prDiv.className="rpt-pr";
      if(p.cardio){
        const it=document.createElement("div");it.className="rpt-pr-item";
        it.innerHTML=`<div class="rpt-pr-label">Best</div><div class="rpt-pr-val">${p.distance} mi</div>`;
        prDiv.appendChild(it);
      }else{
        if(p.weight>0){
          const it=document.createElement("div");it.className="rpt-pr-item";
          it.innerHTML=`<div class="rpt-pr-label">Weight</div><div class="rpt-pr-val">${p.weight} x ${p.weightReps}</div>`;
          prDiv.appendChild(it);
        }
        if(p.reps>0&&(p.repsWeight!==p.weight||p.reps!==p.weightReps)){
          const it=document.createElement("div");it.className="rpt-pr-item";
          it.innerHTML=`<div class="rpt-pr-label">Reps</div><div class="rpt-pr-val">${p.repsWeight} x ${p.reps}</div>`;
          prDiv.appendChild(it);
        }
      }
      row.appendChild(prDiv);sdiv.appendChild(row);
    };

    exercises.forEach(renderRow);
    allAltNames.forEach(renderRow);

    if(!hasData){
      const em=document.createElement("div");em.className="rpt-empty";em.textContent="No data logged yet";
      sdiv.appendChild(em);
    }
    sh.appendChild(sdiv);
  });

  const cn=document.createElement("button");cn.className="modal-cancel";cn.textContent="Close";
  cn.addEventListener("click",()=>{root.innerHTML=""});sh.appendChild(cn);
  ov.appendChild(sh);ov.addEventListener("click",e=>{if(e.target===ov)root.innerHTML=""});
  root.innerHTML="";root.appendChild(ov);
}

function showSwapModal(exIdx,baseEx,color){
  const dk=getDk(),entry=getDayEntry(dk),cur=entry.swaps[exIdx]||null;

  cn.addEventListener("click",()=>{root.innerHTML=""});sh.appendChild(cn);
  ov.appendChild(sh);ov.addEventListener("click",e=>{if(e.target===ov)root.innerHTML=""});
  root.innerHTML="";root.appendChild(ov);
}

let wasComplete=false;

function render(){
  const today=new Date();today.setHours(0,0,0,0);
  const dayType=getDayType(selectedDate);
  const workout=WORKOUTS[dayType];
  const color=workout.color;
  const dk=getDk();

  document.getElementById("header").style.borderBottomColor=color+"22";
  document.getElementById("day-name").textContent=DAY_NAMES[selectedDate.getDay()];
  const dd=document.getElementById("date-display");
  dd.textContent=MONTHS[selectedDate.getMonth()]+" "+selectedDate.getDate();dd.style.color=color;
  document.getElementById("workout-label").textContent=workout.label;
  document.getElementById("workout-label").style.color=color;
  document.getElementById("workout-sub").textContent=workout.subtitle;

  const ws=new Date(selectedDate);ws.setDate(ws.getDate()-ws.getDay());ws.setHours(0,0,0,0);
  const strip=document.getElementById("week-strip");strip.innerHTML="";
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(d.getDate()+i);
    const dt=getDayType(d),sel=dateKey(d)===dk,tod=dateKey(d)===dateKey(today);
    const dc=WORKOUTS[dt].color;
    const btn=document.createElement("button");btn.className="week-day";
    if(sel){btn.style.background=dc+"20";btn.style.borderColor=dc+"60";}
    btn.innerHTML=`<span class="week-day-name">${DAY_NAMES[d.getDay()].slice(0,2)}</span>
      <span class="week-day-num sg" style="font-weight:${sel?700:400};color:${sel?dc:"#888"}">${d.getDate()}</span>
      <span class="week-day-dot" style="background:${tod?dc:"transparent"}"></span>`;
    const cd=new Date(d);btn.addEventListener("click",()=>{selectedDate=cd;expandedExercise=null;render()});
    strip.appendChild(btn);
  }

  let totalAll=0,doneAll=0;
  workout.exercises.forEach((ex,xi)=>{const ext=getExtraSets(dk,xi),t=ex.sets+ext;totalAll+=t;doneAll+=countDone(dk,xi,t)});
  const prog=totalAll>0?doneAll/totalAll:0,isComp=doneAll===totalAll&&totalAll>0;
  document.getElementById("progress-count").textContent=doneAll+"/"+totalAll;
  document.getElementById("progress-count").style.color=isComp?"#5A7D4F":color;
  const fill=document.getElementById("progress-fill");
  fill.style.width=(prog*100)+"%";
  fill.style.background=isComp?"linear-gradient(90deg,#5A7D4F,#7BAF6E)":`linear-gradient(90deg,${color}CC,${color})`;
  fill.style.animation=prog>0&&!isComp?"progressPulse 2s ease infinite":"none";
  document.getElementById("complete-banner").className="complete-banner"+(isComp?" show":"");
  if(isComp&&!wasComplete)showConfetti();wasComplete=isComp;

  const container=document.getElementById("exercises");container.innerHTML="";
  const allPRs=computePRs();
  workout.exercises.forEach((baseEx,exIdx)=>{
    const ex=getEffectiveExercise(dk,exIdx,baseEx);
    const entry=getDayEntry(dk),isSwapped=!!entry.swaps[exIdx],hasAlts=!!ALTERNATIVES[baseEx.name];
    const ext=getExtraSets(dk,exIdx),totalSets=baseEx.sets+ext;
    const done=countDone(dk,exIdx,totalSets),exComp=done===totalSets;
    const isExp=expandedExercise===exIdx;

    const div=document.createElement("div");div.className="exercise"+(exComp?" done":"");div.style.animationDelay=(exIdx*.05)+"s";
    const hdr=document.createElement("button");hdr.className="exercise-header";hdr.style.setProperty("--ac",color);
    // Compute PR for header badge
    let hdrPR="";
    if(!ex.cardio){
      const prName=ex.superset?ex.name.split(" / ")[0].trim():ex.name;
      const prData=allPRs[prName];
      if(prData&&prData.weight>0)hdrPR=` <span class="pr-badge"><span class="pr-badge-icon">🏆</span>${prData.weight}x${prData.weightReps}</span>`;
    }else{
      const prData=allPRs[ex.name];
      if(prData&&prData.distance>0)hdrPR=` <span class="pr-badge"><span class="pr-badge-icon">🏆</span>${prData.distance}mi</span>`;
    }
    hdr.innerHTML=`<div class="exercise-left"><span class="exercise-icon">${ex.icon}</span><div>
      <div class="exercise-name sg" style="color:${exComp?"#7BAF6E":"#F0EDE6"};text-decoration:${exComp?"line-through":"none"};text-decoration-color:#5A7D4F60">${ex.name}</div>
      <div class="exercise-detail">${ex.detail}${hdrPR}</div></div></div>
      <div class="exercise-right">${totalSets>1?`<span class="exercise-count" style="color:${exComp?"#5A7D4F":"#555"}">${done}/${totalSets}</span>`:""}
      <span class="exercise-arrow${isExp?" open":""}">▼</span></div>`;
    hdr.addEventListener("click",()=>{expandedExercise=isExp?null:exIdx;render()});
    div.appendChild(hdr);

    const sDiv=document.createElement("div");sDiv.className="sets-container"+(isExp?" open":"");sDiv.style.setProperty("--ac",color);

    if(isExp&&hasAlts){
      const sr=document.createElement("div");sr.style.cssText="display:flex;justify-content:flex-end;margin-bottom:4px";
      const sb=document.createElement("button");sb.className="swap-btn"+(isSwapped?" swapped":"");sb.style.setProperty("--ac",color);
      sb.textContent=isSwapped?"⇄ Swapped":"⇄ Switch";
      sb.addEventListener("click",e=>{e.stopPropagation();showSwapModal(exIdx,baseEx,color)});
      sr.appendChild(sb);sDiv.appendChild(sr);
    }

    if(isExp&&ex.note){
      const nt=document.createElement("div");nt.className="ex-note";nt.textContent=ex.note;sDiv.appendChild(nt);
    }

    // Inline PR display in expanded view
    if(isExp&&!ex.cardio){
      const prBox=document.createElement("div");prBox.className="pr-inline";
      let hasPRData=false;
      if(ex.superset){
        const n1=ex.name.split(" / ")[0].trim();
        const n2=ex.name2||ex.name.split(" / ")[1]||"";
        const p1=allPRs[n1],p2=allPRs[n2];
        if(p1&&p1.weight>0){
          hasPRData=true;
          const it=document.createElement("div");it.className="pr-inline-item";
          it.innerHTML=`<div class="pr-inline-label">${n1}</div><div class="pr-inline-val">${p1.weight} lbs x ${p1.weightReps}</div>`;
          prBox.appendChild(it);
        }
        if(p2&&p2.weight>0){
          hasPRData=true;
          const it=document.createElement("div");it.className="pr-inline-item";
          it.innerHTML=`<div class="pr-inline-label">${n2}</div><div class="pr-inline-val">${p2.weight} lbs x ${p2.weightReps}</div>`;
          prBox.appendChild(it);
        }
      }else{
        const p=allPRs[ex.name];
        if(p&&p.weight>0){
          hasPRData=true;
          const it1=document.createElement("div");it1.className="pr-inline-item";
          it1.innerHTML=`<div class="pr-inline-label">Weight PR</div><div class="pr-inline-val">${p.weight} lbs x ${p.weightReps}</div>`;
          prBox.appendChild(it1);
          if(p.reps>0&&(p.repsWeight!==p.weight||p.reps!==p.weightReps)){
            const it2=document.createElement("div");it2.className="pr-inline-item";
            it2.innerHTML=`<div class="pr-inline-label">Rep PR</div><div class="pr-inline-val">${p.repsWeight} lbs x ${p.reps}</div>`;
            prBox.appendChild(it2);
          }
        }
      }
      if(hasPRData)sDiv.appendChild(prBox);
    }

    for(let si=0;si<totalSets;si++){
      const sd=getSetData(dk,exIdx,si),checked=sd?sd.done:false,isExtra=si>=baseEx.sets;
      const row=document.createElement("div");row.className="set-row"+(checked?" checked":"");
      if(checked){row.style.background=color+"10";row.style.borderColor=color+"40";}

      const chk=document.createElement("button");chk.className="set-check"+(checked?" on":"");
      chk.style.borderColor=checked?color:"#333";chk.style.background=checked?color:"transparent";
      if(checked)chk.innerHTML='<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7L6 10L11 4" stroke="#0D0D0D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      const cE=exIdx,cS=si;
      chk.addEventListener("click",e=>{e.stopPropagation();toggleDone(cE,cS)});row.appendChild(chk);

      if(ex.cardio){
        const inp=document.createElement("div");inp.className="set-inputs";
        const ir=document.createElement("div");ir.className="set-input-row";
        const f=document.createElement("div");f.className="set-field";
        const l=document.createElement("label");l.textContent="miles";
        const ip=document.createElement("input");ip.type="number";ip.inputMode="decimal";ip.step="0.1";ip.placeholder="0";
        ip.value=sd?(sd.distance||""):"";
        ip.addEventListener("input",e=>{updateField(cE,cS,"distance",e.target.value)});
        ip.addEventListener("click",e=>e.stopPropagation());
        f.appendChild(l);f.appendChild(ip);ir.appendChild(f);inp.appendChild(ir);row.appendChild(inp);
      } else if(ex.superset){
        const num=document.createElement("span");num.className="set-num";num.textContent=si+1;row.appendChild(num);
        const inp=document.createElement("div");inp.className="set-inputs";
        // Exercise 1
        const ssLabel1=document.createElement("div");ssLabel1.className="ss-label";
        ssLabel1.textContent=ex.name.split(" / ")[0]||ex.name;inp.appendChild(ssLabel1);
        const r1=document.createElement("div");r1.className="set-input-row";
        const w1f=document.createElement("div");w1f.className="set-field";
        const w1l=document.createElement("label");w1l.textContent="lbs";
        const w1i=document.createElement("input");w1i.type="number";w1i.inputMode="decimal";w1i.placeholder="0";
        w1i.value=sd?sd.weight:"";w1i.addEventListener("input",e=>{updateField(cE,cS,"weight",e.target.value)});
        w1i.addEventListener("click",e=>e.stopPropagation());w1f.appendChild(w1l);w1f.appendChild(w1i);
        const r1f=document.createElement("div");r1f.className="set-field";
        const r1l=document.createElement("label");r1l.textContent="reps";
        const r1i=document.createElement("input");r1i.type="number";r1i.inputMode="numeric";r1i.placeholder="0";
        r1i.value=sd?sd.reps:"";r1i.addEventListener("input",e=>{updateField(cE,cS,"reps",e.target.value)});
        r1i.addEventListener("click",e=>e.stopPropagation());r1f.appendChild(r1l);r1f.appendChild(r1i);
        r1.appendChild(w1f);r1.appendChild(r1f);inp.appendChild(r1);
        // Exercise 2
        const ssLabel2=document.createElement("div");ssLabel2.className="ss-label";
        ssLabel2.textContent=ex.name2||(ex.name.split(" / ")[1]||"");inp.appendChild(ssLabel2);
        const r2=document.createElement("div");r2.className="set-input-row";
        const w2f=document.createElement("div");w2f.className="set-field";
        const w2l=document.createElement("label");w2l.textContent="lbs";
        const w2i=document.createElement("input");w2i.type="number";w2i.inputMode="decimal";w2i.placeholder="0";
        w2i.value=sd?(sd.weight2||""):"";w2i.addEventListener("input",e=>{updateField(cE,cS,"weight2",e.target.value)});
        w2i.addEventListener("click",e=>e.stopPropagation());w2f.appendChild(w2l);w2f.appendChild(w2i);
        const r2f=document.createElement("div");r2f.className="set-field";
        const r2l=document.createElement("label");r2l.textContent="reps";
        const r2i=document.createElement("input");r2i.type="number";r2i.inputMode="numeric";r2i.placeholder="0";
        r2i.value=sd?(sd.reps2||""):"";r2i.addEventListener("input",e=>{updateField(cE,cS,"reps2",e.target.value)});
        r2i.addEventListener("click",e=>e.stopPropagation());r2f.appendChild(r2l);r2f.appendChild(r2i);
        r2.appendChild(w2f);r2.appendChild(r2f);inp.appendChild(r2);
        row.appendChild(inp);
        if(isExtra){const rm=document.createElement("button");rm.className="remove-set-btn";rm.innerHTML="&#x2715;";
          rm.addEventListener("click",e=>{e.stopPropagation();removeExtraSet(cE,cS)});row.appendChild(rm);}
      } else {
        const num=document.createElement("span");num.className="set-num";num.textContent=si+1;row.appendChild(num);
        const inp=document.createElement("div");inp.className="set-inputs";
        const ir=document.createElement("div");ir.className="set-input-row";
        const wf=document.createElement("div");wf.className="set-field";
        const wl=document.createElement("label");wl.textContent="lbs";
        const wi=document.createElement("input");wi.type="number";wi.inputMode="decimal";wi.placeholder="0";
        wi.value=sd?sd.weight:"";wi.addEventListener("input",e=>{updateField(cE,cS,"weight",e.target.value)});
        wi.addEventListener("click",e=>e.stopPropagation());wf.appendChild(wl);wf.appendChild(wi);
        const rf=document.createElement("div");rf.className="set-field";
        const rl=document.createElement("label");rl.textContent="reps";
        const ri=document.createElement("input");ri.type="number";ri.inputMode="numeric";ri.placeholder="0";
        ri.value=sd?sd.reps:"";ri.addEventListener("input",e=>{updateField(cE,cS,"reps",e.target.value)});
        ri.addEventListener("click",e=>e.stopPropagation());rf.appendChild(rl);rf.appendChild(ri);
        ir.appendChild(wf);ir.appendChild(rf);inp.appendChild(ir);row.appendChild(inp);
        if(isExtra){const rm=document.createElement("button");rm.className="remove-set-btn";rm.innerHTML="&#x2715;";
          rm.addEventListener("click",e=>{e.stopPropagation();removeExtraSet(cE,cS)});row.appendChild(rm);}
      }
      sDiv.appendChild(row);
    }

    if(!ex.cardio){
      const ab=document.createElement("button");ab.className="add-set-btn";ab.innerHTML="+ Add Set";
      ab.addEventListener("click",e=>{e.stopPropagation();addExtraSet(exIdx)});sDiv.appendChild(ab);
    }
    div.appendChild(sDiv);container.appendChild(div);
  });
}

loadData();render();
if("serviceWorker"in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
</script>
</body>
</html>
